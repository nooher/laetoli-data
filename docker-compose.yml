# =============================================================================
# Laetoli Data — sovereign self-hostable backend
# -----------------------------------------------------------------------------
# Services (all images are multi-arch incl. linux/arm64 -> run on a Pi 4/5):
#
#   db      PostgreSQL 16. The database. On FIRST boot it runs every file in
#           ./db/init (mounted into /docker-entrypoint-initdb.d) IN ORDER:
#           00_passwords.sh, 01_roles.sql, 02_auth.sql, 03_example.sql.
#           Data persists in the named volume `pgdata`. Healthcheck: pg_isready.
#
#   rest    PostgREST. Auto REST API over Postgres. Connects AS `authenticator`,
#           verifies JWTs with the shared JWT_SECRET, exposes schemas in
#           PGRST_DB_SCHEMAS with anon role PGRST_DB_ANON_ROLE. Waits for db.
#
#   auth    The sovereign Node/Express auth service (built from ./auth, owned by
#           another agent). Signs HS256 JWTs with the SAME JWT_SECRET, stores
#           users in auth.users. Connects AS `laetoli_auth`. Listens on :9999.
#
#   caddy   Single edge. Reverse-proxies /rest/* -> rest:3000 and
#           /auth/* -> auth:9999, adds CORS + gzip, and does automatic HTTPS
#           when CADDY_DOMAIN is set. Publishes ${CADDY_HTTP:-8088}:80 (+443).
#
# All config comes from .env (env_file + ${VAR} interpolation). Copy
# .env.example -> .env and set POSTGRES_PASSWORD + JWT_SECRET before `up`.
# =============================================================================

name: laetoli-data

services:
  db:
    # pgvector/pgvector:pg16 is a drop-in superset of Postgres 16 with the
    # `vector` extension (AI-native vector search). Multi-arch incl. arm64 (Pi).
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      # Canonical migrations, read-only — the init files 04/05 `\i /migrations/*`
      # on first boot (single source of truth, shared with `laetoli-data migrate`).
      - ./db/migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # Not published to the host by default — reach Postgres only via the
    # internal network. Uncomment to expose for local psql/admin tooling.
    # ports:
    #   - "5432:5432"

  rest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    env_file: .env
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_DB_ANON_ROLE: ${PGRST_DB_ANON_ROLE}
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS}
      PGRST_SERVER_PORT: "3000"
      # Open the schema cache to reload on NOTIFY (handy after migrations).
      PGRST_DB_CHANNEL_ENABLED: "true"
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  auth:
    build:
      context: ./auth
    restart: unless-stopped
    env_file: .env
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY}
      PORT: "9999"
      # The auth service connects AS laetoli_auth to read/write auth.users.
      DATABASE_URL: postgres://laetoli_auth:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PGHOST: db
      PGPORT: "5432"
      PGUSER: laetoli_auth
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "9999"

  storage:
    build:
      context: ./storage
    restart: unless-stopped
    env_file: .env
    environment:
      JWT_SECRET: ${JWT_SECRET}
      STORAGE_PORT: "9998"
      STORAGE_ROOT: /data/storage
      # Multi-tenant API-key enforcement — OFF by default (no-op unless 'true').
      REQUIRE_API_KEY: ${REQUIRE_API_KEY:-false}
      # The storage service connects AS laetoli_storage; bytes live on the
      # storage_data volume, metadata in the `storage` schema.
      DATABASE_URL: postgres://laetoli_storage:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PGHOST: db
      PGPORT: "5432"
      PGUSER: laetoli_storage
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    volumes:
      - storage_data:/data/storage
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "9998"

  realtime:
    build:
      context: ./realtime
    restart: unless-stopped
    env_file: .env
    environment:
      JWT_SECRET: ${JWT_SECRET}
      REALTIME_PORT: "9997"
      REALTIME_CHANNEL: laetoli_realtime
      # Holds the dedicated Postgres LISTEN session as laetoli_realtime.
      DATABASE_URL: postgres://laetoli_realtime:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PGHOST: db
      PGPORT: "5432"
      PGUSER: laetoli_realtime
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "9997"

  webhooks:
    build:
      context: ./webhooks
    restart: unless-stopped
    env_file: .env
    environment:
      WEBHOOKS_PORT: "9993"
      WEBHOOKS_CHANNEL: laetoli_realtime
      # Holds the dedicated Postgres LISTEN session as laetoli_webhooks.
      DATABASE_URL: postgres://laetoli_webhooks:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PGHOST: db
      PGPORT: "5432"
      PGUSER: laetoli_webhooks
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "9993"

  admin:
    build:
      context: ./admin
    restart: unless-stopped
    env_file: .env
    environment:
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      PORT: "9996"
      # Connects AS laetoli_admin_login (BYPASSRLS) — keys-to-the-kingdom.
      DATABASE_URL: postgres://laetoli_admin_login:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PGHOST: db
      PGPORT: "5432"
      PGUSER: laetoli_admin_login
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "9996"

  studio:
    build:
      context: ./studio
    restart: unless-stopped
    depends_on:
      - rest
    expose:
      - "80"

  functions:
    build:
      context: ./functions
    restart: unless-stopped
    env_file: .env
    environment:
      JWT_SECRET: ${JWT_SECRET}
      FUNCTIONS_PORT: "9995"
      FUNCTIONS_ROOT: /functions
      FUNCTION_TIMEOUT_MS: ${FUNCTION_TIMEOUT_MS:-10000}
      # Multi-tenant API-key enforcement — OFF by default. When 'true', functions
      # validates keys against the DB (connects AS laetoli_storage, which has
      # SELECT on keys.*); flip only after minting keys.
      REQUIRE_API_KEY: ${REQUIRE_API_KEY:-false}
      DATABASE_URL: postgres://laetoli_storage:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    volumes:
      - ./functions/src:/functions:ro
    expose:
      - "9995"

  backup:
    build:
      context: ./backup
    restart: unless-stopped
    env_file: .env
    environment:
      BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
      BACKUP_KEEP: ${BACKUP_KEEP:-14}
      BACKUP_PORT: "9994"
      BACKUP_DIR: /backups
      # Dump as the superuser for a complete dump (all schemas/roles' tables).
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PGHOST: db
      PGPORT: "5432"
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    volumes:
      - backups:/backups
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "9994"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-}
    ports:
      - "${CADDY_HTTP:-8088}:80"
      - "${CADDY_HTTPS:-8443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - rest
      - auth
      - storage
      - realtime
      - admin
      - studio
      - functions
      - webhooks

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  storage_data:
  backups:
  # Only used when PITR is enabled (see docs/PITR.md); harmless if unused.
  wal_archive:
