version: 2

# Laetoli Data — multi-package monorepo (each package self-contained with its
# own package.json + lockfile, NOT npm workspaces). Dependabot needs one npm
# entry per package directory. Updates batched weekly and grouped per package
# to keep PR volume low.
updates:
  # ---- npm: one entry per self-contained package ----------------------------
  - package-ecosystem: npm
    directory: /auth
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      auth-deps:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /storage
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      storage-deps:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /realtime
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      realtime-deps:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /admin
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      admin-deps:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /functions
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      functions-deps:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /backup
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      backup-deps:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /cli
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cli-deps:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /client
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      client-deps:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /studio
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      studio-deps:
        patterns:
          - "*"

  # ---- GitHub Actions used by the workflows ---------------------------------
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions-deps:
        patterns:
          - "*"
