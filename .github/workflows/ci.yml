name: CI

# Laetoli Data is a multi-package monorepo where each package is self-contained
# (its own package.json + lockfile, NOT npm workspaces). This pipeline:
#   1. test         — matrix over all 9 packages: ci + typecheck + test + build
#   2. docker-build — validate the compose file and build every service image
#   3. integration  — best-effort: bring the whole stack up and probe health
on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Per-package build/test matrix. Each package has its own lockfile, so npm ci
  # runs inside the package dir and the npm cache keys off that lockfile.
  # All nine packages verified on disk to have test/typecheck/build scripts;
  # build is still guarded with --if-present so a future package without one
  # does not break the matrix.
  # ---------------------------------------------------------------------------
  test:
    name: ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - auth
          - storage
          - realtime
          - admin
          - functions
          - backup
          - cli
          - client
          - studio
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - name: Install (npm ci)
        working-directory: ${{ matrix.package }}
        run: npm ci

      - name: Typecheck
        working-directory: ${{ matrix.package }}
        run: npm run typecheck --if-present

      - name: Test
        working-directory: ${{ matrix.package }}
        run: npm test

      - name: Build
        working-directory: ${{ matrix.package }}
        run: npm run build --if-present

  # ---------------------------------------------------------------------------
  # Validate the compose file and build every service image (auth, storage,
  # realtime, admin, functions, backup, studio all have Dockerfiles; db/rest/
  # caddy are pulled images). docker compose build covers them all in one shot.
  # ---------------------------------------------------------------------------
  docker-build:
    name: docker build smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Provide a .env (compose interpolates ${VAR})
        run: cp .env.example .env

      - name: Validate compose config
        run: docker compose config -q

      - name: Build all service images
        run: docker compose build

  # ---------------------------------------------------------------------------
  # Best-effort end-to-end: spin the full stack up with throwaway secrets and
  # probe each service's /health through Caddy. Marked continue-on-error since
  # container startup timing can be flaky in CI; logs are dumped on failure and
  # the stack + volumes are always torn down.
  # ---------------------------------------------------------------------------
  integration:
    name: integration (stack up + health probes)
    runs-on: ubuntu-latest
    needs: docker-build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Generate a real .env with throwaway secrets
        run: |
          cp .env.example .env
          {
            echo "POSTGRES_PASSWORD=$(openssl rand -base64 24)"
            echo "JWT_SECRET=$(openssl rand -base64 48)"
            echo "ADMIN_API_KEY=$(openssl rand -base64 36)"
          } >> .env

      - name: Bring the stack up
        run: docker compose up -d --build

      - name: Wait for Caddy edge + probe health endpoints
        run: |
          set -u
          BASE="http://localhost:8088"
          # Each service exposes GET /health via Caddy (auth/storage/admin/
          # functions/realtime); PostgREST liveness is its root.
          PROBES="/auth/health /storage/health /admin/health /functions/health /realtime/health /rest/"

          probe() {
            url="$BASE$1"
            for i in $(seq 1 30); do
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "$url" || echo 000)
              # 2xx healthy; 4xx still proves the service answered (e.g. auth-gated).
              case "$code" in
                2*|400|401|403) echo "OK   $1 -> $code"; return 0 ;;
              esac
              sleep 4
            done
            echo "FAIL $1 -> last $code"
            return 1
          }

          rc=0
          for p in $PROBES; do probe "$p" || rc=1; done
          exit $rc

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=200

      - name: Tear down (always)
        if: always()
        run: docker compose down -v
