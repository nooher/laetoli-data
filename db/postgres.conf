# =============================================================================
# Laetoli Data — PITR (point-in-time recovery) Postgres config.  OPT-IN.
# -----------------------------------------------------------------------------
# This file is NOT used by the default `docker compose up`. It only takes effect
# when you mount it into the db container and start Postgres with
#   command: postgres -c config_file=/etc/postgresql/postgresql.conf
# (or pass the individual -c flags). See docs/PITR.md for the full runbook.
#
# Enabling these turns on continuous WAL archiving so an operator can restore
# the database to ANY point in time (not just the nightly pg_dump), by replaying
# the archived WAL on top of a base backup.
# =============================================================================

# Generate enough WAL detail for archiving + replay.
wal_level = replica

# Turn on the archiver and copy each completed WAL segment into the archive.
# %p = path to the WAL file to archive; %f = its bare filename.
# `test ! -f` makes the copy idempotent (never overwrite an existing segment).
archive_mode = on
archive_command = 'test ! -f /wal_archive/%f && cp %p /wal_archive/%f'

# Force a WAL segment switch at least this often so the archive is never more
# than ~5 minutes behind even on a quiet database (bounds your RPO).
archive_timeout = 300

# Keep a few extra senders/segments available for base backups via streaming.
max_wal_senders = 3
wal_keep_size = 256MB

# (Everything else inherits Postgres defaults — this file is intentionally
#  minimal so it can be layered on top of the stock postgres:16-alpine image.)
